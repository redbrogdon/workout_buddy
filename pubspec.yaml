publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  json_schema_builder: ^0.1.3
  firebase_core: ^4.4.0
  firebase_ai: ^3.8.0
  cupertino_icons: ^1.0.8
  genui: ^0.8.0
  path: ^1.9.1
  flutter_riverpod: ^3.3.1
  path_provider: ^2.1.5
  file: ^7.0.1
  google_generative_ai: ^0.4.7
  genai_primitives: ^0.2.3
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
